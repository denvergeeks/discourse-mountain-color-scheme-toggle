toggle_before_icon:
  default: "search"
  type: string
  description: "Header icon key before which the animated scene toggle will be inserted"

show_for_anons:
  default: true
  type: bool
  description: "Show the animated scene toggle for anonymous visitors"

compact_mode:
  default: false
  type: bool
  description: "Use a smaller toggle size"

show_label:
  default: false
  type: bool
  description: "Show a text label beside the toggle"
